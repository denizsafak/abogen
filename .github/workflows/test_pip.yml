name: pip install
run-name: pip install
on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/**'
  workflow_dispatch:
jobs:
  install-and-run:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ['3.12']
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install from repository
        run: python -m pip install .
      #- name: Run abogen
      #  run: abogen
